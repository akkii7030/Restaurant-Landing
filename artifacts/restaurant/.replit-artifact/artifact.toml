kind = "web"
previewPath = "/"
title = "Shree Laxmi Vilas Family Restaurant"
version = "1.0.0"
id = "artifacts/restaurant"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18641
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/restaurant run dev"

[services.env]
PORT = "18641"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/restaurant", "run", "build"]
publicDir = "artifacts/restaurant/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
